# Vocal contrastive finetune — reference hyperparameters (CLI args mirror these).

pretrain_ckpt: ???
manifest_dir: ???
train_subset: train_0
label_csv_dir: ???

sample_rate: 24000
label_csv_format: auto
label_index_rate_hz: "44100"
exclude_classes: "empty,unknown,silence,unk"

batch_size: 8
max_updates: 5000
lr: 1.0e-5
warmup_updates: 500
margin: 0.2
anchor_weight: 0.1
average_top_k_layers: 12

save_interval_updates: 1000
log_interval: 50
normalize: true
freeze_feature_extractor: false
# class_aware: false  # CLI: --class-aware for same-class pos / diff-class neg diagnostic
